<!-- day content is data-driven: render BEFORE script.js so its slideshow/lightbox pick up the generated frame -->
<script src="intern-days.js"></script>
<script>
(function(){
  var DAYS = window.INTERN_DAYS || {};
  var params = new URLSearchParams(window.location.search);
  var n = parseInt(params.get('day'), 10);
  if(!DAYS[n]) n = 1;
  var d = DAYS[n];
  var pad = (n < 10 ? '0' : '') + n;
  var MID = ' \u00B7 ';

  document.title = 'Day ' + pad + MID + d.title + ' | Ansh Panjabi';

  var titleEl = document.getElementById('day-title');
  var metaEl = document.getElementById('day-meta');
  if(titleEl) titleEl.textContent = d.title;
  if(metaEl) metaEl.textContent = 'Day ' + pad + (d.hours ? MID + d.hours + ' hours on the tools' : '');

  /* ---- media ---- */
  var media = document.getElementById('day-media');
  var imgs = d.images || [];
  if(media){
    if(imgs.length === 0){
      media.innerHTML = '<div class="day-empty"><span class="mono">Photos from this day are on the way.</span></div>';
    } else {
      var slidesHTML = imgs.map(function(im, i){
        return '<img class="slide' + (i===0 ? ' active' : '') + '" src="' + im.src +
               '" alt="Day ' + pad + ', Bruce Mills field log" data-day="Day ' + pad +
               '" data-cap="' + im.cap + '">';
      }).join('');
      var controls = '', capTarget = '';
      if(imgs.length > 1){
        controls = '<button class="slide-btn prev" aria-label="Previous image">\u2039</button>' +
                   '<button class="slide-btn next" aria-label="Next image">\u203A</button>' +
                   '<span class="slide-count mono">1 / ' + imgs.length + '</span>';
        capTarget = ' data-cap-target=".day-cap"';
      }
      var corners = '<i class="corner tl"></i><i class="corner tr"></i><i class="corner bl"></i><i class="corner br"></i>';
      media.innerHTML =
        '<div class="frame" style="aspect-ratio:1/1;" data-slides' + capTarget + '>' +
          slidesHTML + controls + corners +
        '</div>' +
        '<p class="day-cap"><span class="intern-cap-day mono">Day ' + pad +
          '</span> <span class="intern-cap-text">' + imgs[0].cap + '</span></p>';
    }
  }

  /* ---- body ---- */
  var body = document.getElementById('day-body');
  if(body){
    var paras = (d.body || []).map(function(p){ return '<p class="desc">' + p + '</p>'; }).join('');
    var tags = (d.tags || []).map(function(t){ return '<span class="tag">' + t + '</span>'; }).join('');
    body.innerHTML = paras + (tags ? '<div class="tags">' + tags + '</div>' : '');
  }

  /* ---- prev / all / next ---- */
  var navEl = document.getElementById('day-nav');
  if(navEl){
    function lbl(x){ return 'Day ' + ((x < 10 ? '0' : '') + x); }
    var prev = n > 1
      ? '<a class="day-move" href="day.html?day=' + (n-1) + '"><span class="ar">\u2190</span> ' + lbl(n-1) + '</a>'
      : '<span class="day-move disabled" aria-hidden="true"></span>';
    var next = n < 19
      ? '<a class="day-move" href="day.html?day=' + (n+1) + '">' + lbl(n+1) + ' <span class="ar">\u2192</span></a>'
      : '<span class="day-move disabled" aria-hidden="true"></span>';
    navEl.innerHTML = prev + '<a class="day-all" href="experience.html">All days</a>' + next;
  }
})();
</script>
<script src="script.js"></script>
